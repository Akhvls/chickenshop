<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chickenshop</title>
    <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="editor-topbar">
        <div class="window-drag-strip">
          <div class="traffic-spacer" aria-hidden="true"></div>
          <button
            class="icon-button sidebar-toggle"
            type="button"
            aria-label="Toggle sidebar"
            aria-expanded="true"
            data-sidebar-toggle
          >
            <img class="ui-icon" src="./assets/icons/sidebar.png" alt="" aria-hidden="true" />
          </button>
          <div class="nav-arrows" aria-label="Navigation">
            <button class="icon-button" type="button" aria-label="Back">
              <img class="ui-icon" src="./assets/icons/back.png" alt="" aria-hidden="true" />
            </button>
            <button class="icon-button muted" type="button" aria-label="Forward">
              <img class="ui-icon" src="./assets/icons/forward.png" alt="" aria-hidden="true" />
            </button>
          </div>
        </div>

        <div class="editor-tabs" role="tablist" aria-label="Open sessions" data-open-tabs></div>

        <div class="linux-window-controls">
          <button type="button" aria-label="Minimize" data-window-action="minimize"></button>
          <button type="button" aria-label="Maximize" data-window-action="maximize"></button>
          <button type="button" aria-label="Close" data-window-action="close"></button>
        </div>
      </header>

      <aside class="sidebar">
        <nav class="primary-nav" aria-label="primary">
          <button class="nav-item" type="button" data-new-chat>
            <img class="ui-icon nav-icon" src="./assets/icons/compose-square.svg" alt="" aria-hidden="true" />
            <span>new chat</span>
          </button>
          <button class="nav-item" type="button" data-new-terminal>
            <img class="ui-icon nav-icon" src="./assets/icons/terminal-add-icon.png" alt="" aria-hidden="true" />
            <span>new terminal</span>
          </button>
        </nav>

        <section class="sidebar-section terminal-section" aria-label="terminal">
          <div class="section-heading">
            <span>terminal</span>
          </div>

          <div class="terminal-list" data-terminal-list></div>
        </section>

        <section class="sidebar-section chats-section" aria-label="chats">
          <div class="section-heading">
            <span>chats</span>
          </div>

          <div class="chat-list" aria-label="chats" data-chat-list></div>
        </section>

        <div class="sidebar-bottom">
          <button class="nav-item" type="button">
            <img class="ui-icon nav-icon" src="./assets/icons/settings.png" alt="" aria-hidden="true" />
            <span>settings</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <section class="editor-shell" aria-label="Agentic development surface" data-viewer-host>
          <section class="home-pane active" aria-label="chickenshop home" data-home-pane>
            <div class="home-content">
              <img
                class="home-logo"
                src="./assets/brand/chickenshop-logo.png"
                alt=""
                aria-hidden="true"
              />
              <h1>chickenshop</h1>
              <dl class="shortcut-list" aria-label="Keyboard shortcuts">
                <div class="shortcut-row">
                  <dt>toggle sidebar</dt>
                  <dd>
                    <kbd>Command</kbd>
                    <span aria-hidden="true">+</span>
                    <kbd>B</kbd>
                  </dd>
                </div>
              </dl>
            </div>
          </section>

          <section
            class="viewer-pane chat-viewer"
            aria-label="chat session"
            data-viewer-panel="chat"
          >
            <div class="chat-model-region">
              <label class="sr-only" for="chat-model-select">Model</label>
              <div class="model-select-wrap">
                <span data-chat-model-label>5.5 Extra High</span>
                <img class="ui-icon model-chevron" src="./assets/icons/chevron-down.png" alt="" aria-hidden="true" />
                <select id="chat-model-select" class="model-select" data-chat-model>
                  <option>5.5 Extra High</option>
                  <option>5.5 High</option>
                  <option>5.4 Medium</option>
                </select>
              </div>
            </div>

            <div class="chat-start">
              <h1 data-chat-title>What should we build in newide?</h1>
              <form class="chat-composer" data-chat-composer>
                <div class="chat-input-shell">
                  <textarea
                    class="chat-input"
                    rows="1"
                    placeholder="Ask newide anything"
                    aria-label="Ask newide anything"
                    data-chat-input
                  ></textarea>
                </div>
                <div class="chat-composer-actions">
                  <button class="composer-icon-button" type="button" aria-label="Add context">
                    <img class="ui-icon" src="./assets/icons/plus.png" alt="" aria-hidden="true" />
                  </button>
                  <button class="composer-send-button" type="submit" aria-label="Send message">
                    <img class="ui-icon" src="./assets/icons/forward.png" alt="" aria-hidden="true" />
                  </button>
                </div>
              </form>
            </div>
          </section>

          <section
            class="viewer-pane terminal-viewer terminal-screen"
            role="textbox"
            tabindex="0"
            aria-label="terminal session"
            aria-multiline="true"
            data-viewer-panel="terminal"
            data-terminal-screen
          ></section>
        </section>
      </main>
    </div>

    <section class="update-banner" role="status" aria-live="polite" hidden data-update-banner>
      <div class="update-banner-copy">
        <span class="update-kicker">update available</span>
        <strong data-update-title></strong>
        <p data-update-notes hidden></p>
      </div>
      <div class="update-banner-actions">
        <button class="update-button secondary" type="button" data-update-dismiss>later</button>
        <button class="update-button primary" type="button" data-update-download>
          download update
        </button>
      </div>
    </section>

    <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
